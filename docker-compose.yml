version: "3.8"

services:
  app:
    image: face-recognition
    container_name: attendance-app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
      - qdrant

  postgres:
    image: postgres:15
    container_name: attendance-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: attendance-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"

  qdrant:
    image: qdrant/qdrant
    container_name: attendance-qdrant
    ports:
      - "6333:6333"